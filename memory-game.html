<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 记忆翻牌大冒险</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:#f5f5f7; font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
    padding:20px;
  }

  h1 { font-size:2.2rem; margin:20px 0 8px; text-align:center; }
  .subtitle { color:#a0a0b0; font-size:1rem; margin-bottom:20px; text-align:center; }

  /* Top bar */
  .top-bar {
    display:flex; gap:24px; justify-content:center; align-items:center;
    padding:12px 28px; border-radius:16px; background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1); margin-bottom:24px; flex-wrap:wrap;
  }
  .stat { text-align:center; }
  .stat-val { font-size:1.8rem; font-weight:700; }
  .stat-label { font-size:0.75rem; color:#9494a0; margin-top:2px; }
  .stat-val.time { color:#ff9f0a; }
  .stat-val.moves { color:#bf5af2; }
  .stat-val.pairs { color:#32d74b; }
  .stat-val.combo { color:#ff375f; }

  /* Difficulty selector */
  .diff-row { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; justify-content:center; }
  .diff-btn {
    padding:10px 24px; border-radius:12px; font-size:0.95rem; cursor:pointer;
    background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.1);
    color:#c4c4cc; font-weight:600; transition:all 0.2s; font-family:inherit;
  }
  .diff-btn:hover { border-color:rgba(255,255,255,0.3); color:#fff; }
  .diff-btn.active { border-color:#bf5af2; color:#bf5af2; background:rgba(191,90,242,0.1); }

  /* Game board */
  .board {
    display:grid; gap:10px; justify-content:center;
    max-width:600px; width:100%;
  }
  .board.cols-4 { grid-template-columns:repeat(4,80px); }
  .board.cols-5 { grid-template-columns:repeat(5,72px); }
  .board.cols-6 { grid-template-columns:repeat(6,64px); }

  .card {
    aspect-ratio:1; border-radius:14px; cursor:pointer;
    position:relative; perspective:600px; user-select:none;
  }
  .card-inner {
    width:100%; height:100%; position:relative;
    transition:transform 0.5s; transform-style:preserve-3d;
  }
  .card.flipped .card-inner { transform:rotateY(180deg); }
  .card.matched .card-inner { transform:rotateY(180deg); }
  .card-face {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    border-radius:14px; backface-visibility:hidden;
  }
  .card .back {
    background:linear-gradient(135deg,#3a2d6e,#5b3a8e);
    border:2px solid rgba(191,90,242,0.3);
    font-size:1.6rem; color:rgba(255,255,255,0.4);
  }
  .card .front {
    background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.15);
    transform:rotateY(180deg); font-size:2.2rem;
  }
  .card.matched .front {
    border-color:#32d74b; background:rgba(50,215,75,0.1);
    animation:matchPop 0.4s ease;
  }
  @keyframes matchPop {
    0%{transform:rotateY(180deg) scale(1)} 50%{transform:rotateY(180deg) scale(1.15)} 100%{transform:rotateY(180deg) scale(1)}
  }
  .card.wrong .card-inner { animation:shake 0.4s ease; }
  @keyframes shake { 25%{transform:rotateY(180deg) translateX(-4px)} 75%{transform:rotateY(180deg) translateX(4px)} }

  /* Message overlay */
  .message {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    padding:32px 48px; border-radius:24px; background:rgba(15,12,41,0.95);
    border:2px solid rgba(191,90,242,0.4); text-align:center;
    font-size:1.6rem; font-weight:700; z-index:10; display:none;
    backdrop-filter:blur(20px);
  }
  .message.show { display:block; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translate(-50%,-50%) scale(0.9)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
  .message .msg-sub { font-size:0.95rem; color:#a0a0b0; margin-top:8px; font-weight:400; }
  .message .play-btn {
    margin-top:16px; padding:12px 32px; border-radius:12px; font-size:1.1rem;
    cursor:pointer; background:linear-gradient(135deg,#bf5af2,#ff375f);
    border:none; color:#fff; font-weight:700; font-family:inherit;
    transition:transform 0.2s;
  }
  .message .play-btn:hover { transform:scale(1.05); }

  /* Combo popup */
  .combo-popup {
    position:fixed; top:40%; left:50%; transform:translate(-50%,-50%);
    font-size:2rem; font-weight:700; pointer-events:none; z-index:5;
    opacity:0; transition:all 0.5s;
  }
  .combo-popup.show { opacity:1; animation:comboUp 1s ease forwards; }
  @keyframes comboUp { 0%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-70%) scale(1.3)} }

  /* Stars animation for win */
  .stars { position:fixed; inset:0; pointer-events:none; z-index:4; }
  .star {
    position:absolute; font-size:1.5rem;
    animation:starFall 2s ease forwards;
  }
  @keyframes starFall {
    0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
  }

  @media (max-width:500px) {
    .board.cols-4 { grid-template-columns:repeat(4,68px); }
    .board.cols-5 { grid-template-columns:repeat(5,58px); }
    .board.cols-6 { grid-template-columns:repeat(6,48px); }
    .card .front { font-size:1.6rem; }
    h1 { font-size:1.6rem; }
    .top-bar { gap:16px; padding:10px 18px; }
    .stat-val { font-size:1.4rem; }
  }
</style>
</head>
<body>

<h1>🧠 记忆翻牌大冒险</h1>
<div class="subtitle">找到所有相同的配对！考验你的记忆力！</div>

<div class="diff-row">
  <button class="diff-btn active" onclick="setDiff('easy')">🌟 简单 (6对)</button>
  <button class="diff-btn" onclick="setDiff('medium')">⭐ 中等 (8对)</button>
  <button class="diff-btn" onclick="setDiff('hard')">🔥 困难 (12对)</button>
</div>

<div class="top-bar">
  <div class="stat"><div class="stat-val time" id="timer">0:00</div><div class="stat-label">用时</div></div>
  <div class="stat"><div class="stat-val moves" id="moves">0</div><div class="stat-label">翻牌</div></div>
  <div class="stat"><div class="stat-val pairs" id="pairs">0/6</div><div class="stat-label">配对</div></div>
  <div class="stat"><div class="stat-val combo" id="combo">0</div><div class="stat-label">连击</div></div>
</div>

<div class="board cols-4" id="board"></div>

<div class="message" id="winMsg">
  <div id="winText">🎉 太厉害了！</div>
  <div class="msg-sub" id="winSub">用了 0 次翻牌，耗时 0:00</div>
  <button class="play-btn" onclick="startGame()">🔄 再来一局</button>
</div>

<div class="combo-popup" id="comboPopup"></div>
<div class="stars" id="stars"></div>

<script>
const THEMES = {
  animals: ['🐱','🐶','🐼','🦊','🐰','🐸','🦋','🐬','🦄','🐧','🦁','🐝'],
  food:    ['🍕','🍩','🍉','🍓','🎂','🍪','🍔','🍦','🥤','🍿','🥝','🍫'],
  space:   ['🚀','🌙','⭐','🪐','👽','🛸','☄️','🌍','🔭','💫','🌌','👨‍🚀'],
  nature:  ['🌸','🌈','🌻','🍀','🌊','🔥','❄️','🌺','🍁','🌴','🌵','🎄'],
};

const DIFFS = {
  easy:   { pairs:6, cols:4 },
  medium: { pairs:8, cols:4 },
  hard:   { pairs:12, cols:6 },
};

let difficulty = 'easy';
let cards = [];
let flipped = [];
let matched = 0;
let totalPairs = 6;
let moveCount = 0;
let comboCount = 0;
let maxCombo = 0;
let locked = false;
let timerInterval = null;
let seconds = 0;
let gameActive = false;

function setDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  startGame();
}

function startGame() {
  const cfg = DIFFS[difficulty];
  totalPairs = cfg.pairs;
  matched = 0;
  moveCount = 0;
  comboCount = 0;
  maxCombo = 0;
  flipped = [];
  locked = false;
  seconds = 0;
  gameActive = true;

  document.getElementById('winMsg').classList.remove('show');
  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = `0/${totalPairs}`;
  document.getElementById('combo').textContent = '0';
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('stars').innerHTML = '';

  // Board setup
  const board = document.getElementById('board');
  board.className = 'board cols-'+cfg.cols;
  board.innerHTML = '';

  // Pick random theme
  const themeKeys = Object.keys(THEMES);
  const theme = THEMES[themeKeys[Math.floor(Math.random()*themeKeys.length)]];
  const picked = theme.slice(0, totalPairs);
  cards = [...picked, ...picked].sort(()=>Math.random()-0.5);

  cards.forEach((emoji,i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-inner"><div class="card-face back">❓</div><div class="card-face front">${emoji}</div></div>`;
    card.onclick = () => flipCard(card, i);
    board.appendChild(card);
  });

  // Timer
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    if(!gameActive) return;
    seconds++;
    const m = Math.floor(seconds/60);
    const s = seconds%60;
    document.getElementById('timer').textContent = m+':'+(s<10?'0':'')+s;
  }, 1000);
}

function flipCard(card, index) {
  if(locked) return;
  if(card.classList.contains('flipped')||card.classList.contains('matched')) return;

  card.classList.add('flipped');
  playSound(600, 0.08);
  flipped.push({card, index, emoji:cards[index]});

  if(flipped.length===2) {
    moveCount++;
    document.getElementById('moves').textContent = moveCount;
    locked = true;
    const [a,b] = flipped;

    if(a.emoji===b.emoji) {
      // Match!
      comboCount++;
      if(comboCount>maxCombo) maxCombo=comboCount;
      setTimeout(()=>{
        a.card.classList.add('matched');
        b.card.classList.add('matched');
        playSound(800, 0.1);
        setTimeout(()=>playSound(1000, 0.08), 100);
        matched++;
        document.getElementById('pairs').textContent = matched+'/'+totalPairs;
        document.getElementById('combo').textContent = comboCount;

        if(comboCount>=2) showCombo(comboCount);

        if(matched===totalPairs) winGame();
        flipped = [];
        locked = false;
      }, 350);
    } else {
      // No match
      comboCount = 0;
      document.getElementById('combo').textContent = '0';
      setTimeout(()=>{
        a.card.classList.add('wrong');
        b.card.classList.add('wrong');
        playSound(300, 0.08);
        setTimeout(()=>{
          a.card.classList.remove('flipped','wrong');
          b.card.classList.remove('flipped','wrong');
          flipped = [];
          locked = false;
        }, 500);
      }, 600);
    }
  }
}

function showCombo(n) {
  const popup = document.getElementById('comboPopup');
  popup.className = 'combo-popup';
  const msgs = ['','','🔥 2连击！','⚡ 3连击！','💥 4连击！','🌟 5连击！','👑 超级连击！'];
  popup.textContent = msgs[Math.min(n, 6)];
  void popup.offsetWidth;
  popup.classList.add('show');
  setTimeout(()=>popup.classList.remove('show'), 1000);
}

function winGame() {
  gameActive = false;
  clearInterval(timerInterval);
  const m = Math.floor(seconds/60);
  const s = seconds%60;
  const timeStr = m+':'+(s<10?'0':'')+s;

  let rating = '🌟';
  const perfect = totalPairs;
  if(moveCount <= perfect+2) rating = '🌟🌟🌟 完美！';
  else if(moveCount <= perfect*1.5) rating = '🌟🌟 很棒！';
  else rating = '🌟 不错！';

  document.getElementById('winText').textContent = '🎉 ' + rating;
  document.getElementById('winSub').textContent = `翻牌 ${moveCount} 次 · 用时 ${timeStr} · 最高连击 ${maxCombo}`;
  setTimeout(()=>{
    document.getElementById('winMsg').classList.add('show');
    spawnStars();
  }, 500);
}

function spawnStars() {
  const container = document.getElementById('stars');
  container.innerHTML = '';
  const emojis = ['⭐','🌟','✨','💫','🎉','🎊'];
  for(let i=0;i<30;i++){
    const star = document.createElement('div');
    star.className = 'star';
    star.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    star.style.left = Math.random()*100+'%';
    star.style.animationDelay = Math.random()*1.5+'s';
    star.style.fontSize = (1+Math.random()*1.5)+'rem';
    container.appendChild(star);
  }
}

// Simple sound
function playSound(freq, dur) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    osc.start();
    osc.stop(ctx.currentTime+dur);
  } catch(e) {}
}

// Start!
startGame();
</script>
</body>
</html>
